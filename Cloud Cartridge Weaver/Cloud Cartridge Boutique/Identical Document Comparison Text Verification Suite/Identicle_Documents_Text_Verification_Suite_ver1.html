<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Checksum - Text Verification Suite</title>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // Using Inline SVGs to avoid Lucide DOM manipulation errors (removeChild issues)
        const FileText = ({ size = 24, className = "" }) => (
          <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
            <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/>
          </svg>
        );

        const AlertCircle = ({ size = 24, className = "" }) => (
          <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
        );

        const CheckCircle2 = ({ size = 24, className = "" }) => (
          <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
            <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/>
          </svg>
        );

        const Trash2 = ({ size = 24, className = "" }) => (
          <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
            <path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/>
          </svg>
        );

        const Info = ({ size = 24, className = "" }) => (
          <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
          </svg>
        );

        const UploadCloud = ({ size = 24, className = "" }) => (
          <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
            <path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="m16 16-4-4-4 4"/>
          </svg>
        );

        // External libraries for parsing binary documents
        const MAMMOTH_CDN = "https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js";
        const PDFJS_CDN = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";

        const App = () => {
          const [doc1, setDoc1] = useState('');
          const [doc2, setDoc2] = useState('');
          const [differences, setDifferences] = useState([]);
          const [isComparing, setIsComparing] = useState(false);
          const [dragActive1, setDragActive1] = useState(false);
          const [dragActive2, setDragActive2] = useState(false);
          const [isProcessing, setIsProcessing] = useState(false);

          // Load external scripts for PDF and Word processing
          useEffect(() => {
            const loadScript = (src) => {
              if (document.querySelector(`script[src="${src}"]`)) return;
              const script = document.createElement('script');
              script.src = src;
              script.async = true;
              document.body.appendChild(script);
            };
            loadScript(MAMMOTH_CDN);
            loadScript(PDFJS_CDN);
          }, []);

          // Statistics Calculation
          const getStats = (text) => {
            const charCount = text.length;
            const wordCount = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
            return { charCount, wordCount };
          };

          const stats1 = getStats(doc1);
          const stats2 = getStats(doc2);

          // Core function to extract text from various file types
          const extractTextFromFile = async (file) => {
            const extension = file.name.split('.').pop().toLowerCase();
            
            // 1. Handle Plain Text or Markdown
            if (extension === 'txt' || extension === 'md' || file.type === 'text/plain') {
              return await file.text();
            }

            // 2. Handle Word Documents (.docx)
            if (extension === 'docx') {
              if (!window.mammoth) throw new Error("Word parser still loading...");
              const arrayBuffer = await file.arrayBuffer();
              const result = await window.mammoth.extractRawText({ arrayBuffer });
              return result.value;
            }

            // 3. Handle PDF Documents
            if (extension === 'pdf') {
              if (!window.pdfjsLib) throw new Error("PDF parser still loading...");
              window.pdfjsLib.GlobalWorkerOptions.workerSrc = `https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js`;
              
              const arrayBuffer = await file.arrayBuffer();
              const pdf = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;
              let fullText = "";
              for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                const strings = content.items.map(item => item.str);
                fullText += strings.join(" ") + "\n";
              }
              return fullText;
            }

            throw new Error("Unsupported file type. Please use .txt, .md, .docx, or .pdf");
          };

          const handleFileProcessing = async (file, setDoc) => {
            setIsProcessing(true);
            try {
              const text = await extractTextFromFile(file);
              setDoc(text);
            } catch (err) {
              console.error(err);
              console.error(`Error processing file: ${err.message}`);
            } finally {
              setIsProcessing(false);
            }
          };

          // Drag and Drop Handlers
          const handleDrag = (e, setDragActive) => {
            e.preventDefault();
            e.stopPropagation();
            if (e.type === "dragenter" || e.type === "dragover") {
              setDragActive(true);
            } else if (e.type === "dragleave") {
              setDragActive(false);
            }
          };

          const handleDrop = (e, setDoc, setDragActive) => {
            e.preventDefault();
            e.stopPropagation();
            setDragActive(false);
            if (e.dataTransfer.files && e.dataTransfer.files[0]) {
              handleFileProcessing(e.dataTransfer.files[0], setDoc);
            }
          };

          // Simple diff algorithm (Word by Word)
          const compareTexts = useCallback(() => {
            setIsComparing(true);
            const words1 = doc1.trim().split(/\s+/).filter(w => w.length > 0);
            const words2 = doc2.trim().split(/\s+/).filter(w => w.length > 0);
            
            const diffs = [];
            const maxLength = Math.max(words1.length, words2.length);

            for (let i = 0; i < maxLength; i++) {
              if (words1[i] !== words2[i]) {
                diffs.push({
                  index: i,
                  original: words1[i] || '[Missing]',
                  modified: words2[i] || '[Missing]'
                });
              }
            }
            setDifferences(diffs);
            setIsComparing(false);
          }, [doc1, doc2]);

          useEffect(() => {
            if (doc1 && doc2) {
              compareTexts();
            } else {
              setDifferences([]);
            }
          }, [doc1, doc2, compareTexts]);

          const clearAll = () => {
            setDoc1('');
            setDoc2('');
            setDifferences([]);
          };

          return (
            <div className="min-h-screen bg-slate-50 p-4 md:p-8 font-sans text-slate-900">
              <div className="max-w-6xl mx-auto space-y-6">
                
                {/* Header */}
                <header className="flex flex-col md:flex-row md:items-center justify-between gap-4 border-b pb-6 border-slate-200">
                  <div>
                    <h1 className="text-3xl font-bold text-slate-800 flex items-center gap-2">
                      <FileText className="text-blue-600" size={32} /> Document Checksum
                    </h1>
                    <p className="text-slate-500 mt-1">Drag & Drop Word, PDF, or Text files to compare versions.</p>
                  </div>
                  <div className="flex gap-3">
                    {isProcessing && (
                      <div className="flex items-center gap-2 text-blue-600 font-medium animate-pulse">
                        Processing Document...
                      </div>
                    )}
                    <button 
                      onClick={clearAll}
                      className="flex items-center gap-2 px-4 py-2 bg-white border border-slate-200 rounded-lg hover:bg-slate-100 transition-colors text-red-600 font-medium shadow-sm"
                    >
                      <Trash2 size={18} /> Clear Session
                    </button>
                  </div>
                </header>

                {/* Input Areas */}
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  {/* Document 1 */}
                  <div 
                    className={`bg-white rounded-xl shadow-sm border-2 transition-all overflow-hidden flex flex-col ${dragActive1 ? 'border-blue-500 bg-blue-50 scale-[1.01]' : 'border-slate-200'}`}
                    onDragEnter={(e) => handleDrag(e, setDragActive1)}
                    onDragLeave={(e) => handleDrag(e, setDragActive1)}
                    onDragOver={(e) => handleDrag(e, setDragActive1)}
                    onDrop={(e) => handleDrop(e, setDoc1, setDragActive1)}
                  >
                    <div className="bg-slate-800 text-white px-4 py-3 flex justify-between items-center">
                      <span className="font-semibold uppercase tracking-wider text-xs">Primary Document (Original)</span>
                      <div className="text-xs opacity-80">Drag & Drop Enabled</div>
                    </div>
                    <textarea
                      className="w-full h-80 p-4 focus:outline-none bg-transparent resize-none text-slate-700 leading-relaxed"
                      placeholder="Drop a .docx, .pdf, or .txt file here, or paste text..."
                      value={doc1}
                      onChange={(e) => setDoc1(e.target.value)}
                    />
                    <div className="bg-slate-50 border-t border-slate-200 p-3 flex justify-between items-center text-sm font-medium">
                      <div className="flex gap-4">
                        <span className="text-slate-600">Words: <span className="text-blue-600">{stats1.wordCount}</span></span>
                        <span className="text-slate-600">Chars: <span className="text-blue-600">{stats1.charCount}</span></span>
                      </div>
                      <label className="cursor-pointer bg-blue-50 text-blue-700 px-3 py-1 rounded hover:bg-blue-100 transition-colors flex items-center gap-2">
                        <UploadCloud size={14} /> Upload
                        <input type="file" className="hidden" accept=".txt,.md,.docx,.pdf" onChange={(e) => handleFileProcessing(e.target.files[0], setDoc1)} />
                      </label>
                    </div>
                  </div>

                  {/* Document 2 */}
                  <div 
                    className={`bg-white rounded-xl shadow-sm border-2 transition-all overflow-hidden flex flex-col ${dragActive2 ? 'border-blue-500 bg-blue-50 scale-[1.01]' : 'border-slate-200'}`}
                    onDragEnter={(e) => handleDrag(e, setDragActive2)}
                    onDragLeave={(e) => handleDrag(e, setDragActive2)}
                    onDragOver={(e) => handleDrag(e, setDragActive2)}
                    onDrop={(e) => handleDrop(e, setDoc2, setDragActive2)}
                  >
                    <div className="bg-slate-800 text-white px-4 py-3 flex justify-between items-center">
                      <span className="font-semibold uppercase tracking-wider text-xs">Comparison Document (Modified)</span>
                      <div className="text-xs opacity-80">Drag & Drop Enabled</div>
                    </div>
                    <textarea
                      className="w-full h-80 p-4 focus:outline-none bg-transparent resize-none text-slate-700 leading-relaxed"
                      placeholder="Drop the second version here..."
                      value={doc2}
                      onChange={(e) => setDoc2(e.target.value)}
                    />
                    <div className="bg-slate-50 border-t border-slate-200 p-3 flex justify-between items-center text-sm font-medium">
                      <div className="flex gap-4">
                        <span className="text-slate-600">Words: <span className="text-blue-600">{stats2.wordCount}</span></span>
                        <span className="text-slate-600">Chars: <span className="text-blue-600">{stats2.charCount}</span></span>
                      </div>
                      <label className="cursor-pointer bg-blue-50 text-blue-700 px-3 py-1 rounded hover:bg-blue-100 transition-colors flex items-center gap-2">
                        <UploadCloud size={14} /> Upload
                        <input type="file" className="hidden" accept=".txt,.md,.docx,.pdf" onChange={(e) => handleFileProcessing(e.target.files[0], setDoc2)} />
                      </label>
                    </div>
                  </div>
                </div>

                {/* Comparison Result Section */}
                <div className="bg-white rounded-xl shadow-md border border-slate-200 overflow-hidden">
                  <div className="bg-blue-600 text-white px-6 py-4 flex justify-between items-center">
                    <h2 className="text-xl font-bold flex items-center gap-2">
                      <Info size={20} /> Analysis & Drift Report
                    </h2>
                    <div className="flex items-center gap-4">
                      {doc1 && doc2 && differences.length === 0 ? (
                        <div className="flex items-center gap-1 bg-green-500 px-3 py-1 rounded-full text-xs font-bold uppercase">
                          <CheckCircle2 size={14} /> Perfect Match
                        </div>
                      ) : doc1 && doc2 ? (
                        <div className="flex items-center gap-1 bg-amber-500 px-3 py-1 rounded-full text-xs font-bold uppercase text-white">
                          <AlertCircle size={14} /> {differences.length} Variances Found
                        </div>
                      ) : null}
                    </div>
                  </div>

                  <div className="p-6">
                    {!doc1 || !doc2 ? (
                      <div className="text-center py-12 text-slate-400">
                        <div className="flex justify-center mb-4 text-slate-200">
                          <UploadCloud size={64} />
                        </div>
                        <p className="text-lg">Drag and drop two documents to start the comparison.</p>
                      </div>
                    ) : differences.length === 0 ? (
                      <div className="text-center py-12">
                        <div className="flex justify-center mb-4 text-green-500">
                          <CheckCircle2 size={64} />
                        </div>
                        <h3 className="text-2xl font-semibold text-slate-800">Checksum Verified!</h3>
                        <p className="text-slate-500 mt-2">The text content is identical across both files.</p>
                      </div>
                    ) : (
                      <div className="space-y-4">
                        <div className="flex items-center gap-4 text-sm font-medium mb-4 p-3 bg-red-50 text-red-700 rounded-lg">
                          <AlertCircle size={20} />
                          <span>The checksum failed: {differences.length} word-level differences detected.</span>
                        </div>
                        
                        <div className="max-h-96 overflow-y-auto border rounded-lg">
                          <table className="w-full text-left border-collapse">
                            <thead className="sticky top-0 bg-slate-100 z-10 shadow-sm">
                              <tr className="text-slate-600 text-xs uppercase tracking-widest font-bold">
                                <th className="py-3 px-4 w-1/4">Pos</th>
                                <th className="py-3 px-4 w-3/8">Box 1 (Original)</th>
                                <th className="py-3 px-4 w-3/8">Box 2 (New)</th>
                              </tr>
                            </thead>
                            <tbody className="text-sm">
                              {differences.slice(0, 500).map((diff, i) => (
                                <tr key={i} className="border-b border-slate-50 hover:bg-slate-50 transition-colors">
                                  <td className="py-2 px-4 text-slate-400 font-mono">#{diff.index + 1}</td>
                                  <td className="py-2 px-4 text-red-600 font-medium line-through bg-red-50/30">{diff.original}</td>
                                  <td className="py-2 px-4 text-green-700 font-bold bg-green-50">{diff.modified}</td>
                                </tr>
                              ))}
                              {differences.length > 500 && (
                                <tr>
                                  <td colSpan="3" className="py-4 text-center text-slate-500 italic bg-slate-50">
                                    Showing first 500 differences. {differences.length - 500} more remain.
                                  </td>
                                </tr>
                              )}
                            </tbody>
                          </table>
                        </div>
                      </div>
                    )}
                  </div>
                  
                  <div className="bg-slate-100 p-4 border-t border-slate-200 flex flex-col md:flex-row gap-4 items-center justify-between">
                    <div className="text-xs text-slate-500 italic">
                      * Note: Binary files (PDF/Word) are automatically stripped of images and formatting to check "Text-Only" drift.
                    </div>
                    <div className="flex gap-2">
                       <div className={`px-4 py-1.5 rounded-md text-xs font-bold shadow-sm ${differences.length > 0 ? 'bg-red-500 text-white' : 'bg-green-600 text-white'}`}>
                         DRIFT RATIO: {doc1 ? ((differences.length / doc1.split(/\s+/).length) * 100).toFixed(2) : 0}%
                       </div>
                    </div>
                  </div>
                </div>

              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
