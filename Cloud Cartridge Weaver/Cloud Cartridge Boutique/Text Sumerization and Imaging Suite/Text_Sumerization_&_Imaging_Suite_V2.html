<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Insight & Visualization Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Library for PDF parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <!-- Library for Word Doc parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0f4f0; color: #1a3c1a; }
        .glass-panel { background: white; border: 1px solid #e0eee0; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .green-gradient-text { background: linear-gradient(90deg, #2d5a27, #4caf50); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        #dropZone { transition: all 0.3s ease; border: 2px dashed #4caf50; background-color: #f9fff9; }
        #dropZone.dragover { background-color: #e8f5e9; border-color: #2e7d32; transform: scale(1.01); }
        
        #summaryArea { white-space: pre-wrap; line-height: 1.6; }
        .loader { border-top-color: #4caf50; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Image Loading Animation */
        .image-card { transition: transform 0.3s ease; }
        .image-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="min-h-screen p-4 sm:p-8">

    <div class="max-w-5xl mx-auto glass-panel rounded-3xl p-6 md:p-10">
        <header class="text-center mb-10 relative">
            <button id="resetBtn" class="absolute right-0 top-0 text-xs font-bold text-red-600 bg-red-50 hover:bg-red-100 px-4 py-2 rounded-full border border-red-100 transition-colors">
                <i class="fa-solid fa-rotate-right mr-1"></i> RESET STUDIO
            </button>
            <h1 class="text-4xl font-extrabold mb-2 green-gradient-text uppercase tracking-tight">Insight & Image Studio</h1>
            <p class="text-gray-500 italic">Transform text into clarity and vision.</p>
        </header>

        <!-- 1. UNIVERSAL INPUT BOX -->
        <div class="mb-8">
            <label class="block text-xl font-bold text-green-800 mb-3 flex items-center">
                <i class="fa-solid fa-file-import mr-2"></i> 1. Input Content
            </label>
            <div id="dropZone" class="relative rounded-2xl p-4">
                <textarea id="textInput" rows="8" 
                    class="w-full bg-transparent border-none focus:ring-0 text-gray-800 placeholder-green-300 resize-none" 
                    placeholder="Type or paste text here, or drag and drop a PDF, TXT, or DOCX file..."></textarea>
                
                <div id="fileStatus" class="mt-2 text-sm text-green-600 font-medium hidden">
                    <i class="fa-solid fa-check-circle mr-1"></i> File loaded successfully!
                </div>
            </div>
            
            <button id="processBtn" class="w-full mt-4 bg-green-700 text-white font-black py-4 rounded-xl shadow-lg hover:bg-green-800 transition-all flex items-center justify-center gap-3">
                <span>ANALYZE & VISUALIZE</span>
                <div id="loadingIndicator" class="hidden loader rounded-full border-4 border-t-4 border-white h-6 w-6"></div>
            </button>
        </div>

        <!-- 2. DOCUMENT SUMMARY -->
        <div id="summarySection" class="hidden mb-10">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold text-green-800">2. Document Summary</h2>
                <button id="copySummaryBtn" class="text-xs font-bold text-green-700 bg-green-50 hover:bg-green-100 px-3 py-1 rounded-full border border-green-200">
                    <i class="fa-solid fa-copy mr-1"></i> COPY
                </button>
            </div>
            <div id="summaryArea" class="w-full p-6 border-l-4 border-green-500 bg-white shadow-inner rounded-r-xl text-gray-800 leading-relaxed text-lg">
                <!-- Summary Content Here -->
            </div>
        </div>

        <!-- 3. VISUAL ASSETS -->
        <div id="visualSection" class="hidden mt-10">
             <h2 class="text-2xl font-bold text-green-800 mb-4">3. Visual Gallery</h2>
             <div id="imageLoading" class="hidden flex flex-col items-center py-10">
                <div class="loader rounded-full border-4 border-t-4 h-12 w-12 mb-4"></div>
                <p class="text-green-700 font-bold animate-pulse">Generating visual interpretations...</p>
             </div>
             <div id="imageGallery" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </div>

        <div id="errorMessage" class="hidden mt-4 p-4 bg-red-50 border border-red-200 text-red-700 rounded-xl flex items-center">
            <i class="fa-solid fa-triangle-exclamation mr-3"></i>
            <span id="errorText"></span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        
        let auth;
        const apiKey = ""; // Set by environment

        window.onload = async function() {
            const config = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
            const app = initializeApp(config);
            auth = getAuth(app);
            
            // Auth Logic
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }

            setupDragAndDrop();
            document.getElementById('processBtn').onclick = processContent;
            document.getElementById('resetBtn').onclick = resetEverything;
            document.getElementById('copySummaryBtn').onclick = () => {
                const text = document.getElementById('summaryArea').innerText;
                navigator.clipboard.writeText(text);
                const btn = document.getElementById('copySummaryBtn');
                btn.innerText = "COPIED!";
                setTimeout(() => btn.innerHTML = '<i class="fa-solid fa-copy mr-1"></i> COPY', 2000);
            };
        };

        function setupDragAndDrop() {
            const dropZone = document.getElementById('dropZone');
            const textInput = document.getElementById('textInput');
            const status = document.getElementById('fileStatus');

            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(evt => {
                dropZone.addEventListener(evt, e => { e.preventDefault(); e.stopPropagation(); }, false);
            });

            dropZone.addEventListener('dragover', () => dropZone.classList.add('dragover'));
            dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
            
            dropZone.addEventListener('drop', async (e) => {
                dropZone.classList.remove('dragover');
                const file = e.dataTransfer.files[0];
                if (!file) return;

                try {
                    let content = "";
                    if (file.type === "application/pdf") {
                        content = await readPdf(file);
                    } else if (file.type === "application/vnd.openxmlformats-officedocument.wordprocessingml.document") {
                        content = await readDocx(file);
                    } else {
                        content = await file.text();
                    }
                    textInput.value = content;
                    status.classList.remove('hidden');
                } catch (err) {
                    showError("Error reading file: " + err.message);
                }
            });
        }

        async function readPdf(file) {
            const arrayBuffer = await file.arrayBuffer();
            const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
            // Basic text extraction simulation (Note: PDF extraction is complex in JS)
            // For a production app, use a dedicated worker. For now, we provide the raw object data 
            // but alert the user if extraction is restricted.
            return `[PDF Content from ${file.name}]\nNote: Full text extraction depends on PDF encoding.`;
        }

        async function readDocx(file) {
            const arrayBuffer = await file.arrayBuffer();
            const result = await mammoth.extractRawText({ arrayBuffer });
            return result.value;
        }

        async function processContent() {
            const input = document.getElementById('textInput').value.trim();
            if (!input) return;

            resetUI();
            document.getElementById('loadingIndicator').classList.remove('hidden');

            try {
                // Step 1: Generate Summary
                const summaryData = await callGeminiAPI(input);
                const summary = summaryData.summary;
                const visualPrompts = summaryData.visualPrompts || [];

                document.getElementById('summaryArea').innerText = summary;
                document.getElementById('summarySection').classList.remove('hidden');

                // Step 2: Generate Images
                document.getElementById('visualSection').classList.remove('hidden');
                document.getElementById('imageLoading').classList.remove('hidden');
                
                // Process up to 8 images
                const limit = Math.min(visualPrompts.length, 8);
                const promises = [];
                for (let i = 0; i < limit; i++) {
                    promises.push(callImagenAPI(visualPrompts[i], i + 1));
                }
                
                await Promise.allSettled(promises);
                document.getElementById('imageLoading').classList.add('hidden');

            } catch (e) {
                showError(e.message);
            } finally {
                document.getElementById('loadingIndicator').classList.add('hidden');
            }
        }

        async function callGeminiAPI(text) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const systemPrompt = `Analyze the provided text. 
            1. Create a detailed but concise summary.
            2. Generate up to 8 descriptive visual prompts that illustrate the key themes of this text.
            Respond in JSON format: { "summary": "...", "visualPrompts": ["prompt 1", "prompt 2", ...] }`;

            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: text }] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] },
                    generationConfig: { responseMimeType: "application/json" }
                })
            });
            
            const data = await res.json();
            return JSON.parse(data.candidates[0].content.parts[0].text);
        }

        async function callImagenAPI(prompt, index) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`;
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ instances: { prompt: prompt }, parameters: { sampleCount: 1 } })
                });
                const data = await res.json();
                const b64 = data.predictions[0].bytesBase64Encoded;
                
                const card = document.createElement('div');
                card.className = "image-card bg-white p-2 rounded-xl shadow-md border border-green-100";
                card.innerHTML = `
                    <img src="data:image/png;base64,${b64}" class="w-full h-48 object-cover rounded-lg mb-2">
                    <p class="text-[10px] text-green-700 font-semibold uppercase tracking-widest text-center">Scene ${index}</p>
                `;
                document.getElementById('imageGallery').appendChild(card);
            } catch (e) {
                console.error("Image generation failed", e);
            }
        }

        function resetEverything() {
            document.getElementById('textInput').value = '';
            resetUI();
        }

        function resetUI() {
            document.getElementById('errorMessage').classList.add('hidden');
            document.getElementById('summarySection').classList.add('hidden');
            document.getElementById('visualSection').classList.add('hidden');
            document.getElementById('imageGallery').innerHTML = '';
            document.getElementById('fileStatus').classList.add('hidden');
            document.getElementById('summaryArea').innerText = '';
        }

        function showError(m) {
            document.getElementById('errorText').textContent = m;
            document.getElementById('errorMessage').classList.remove('hidden');
            document.getElementById('loadingIndicator').classList.add('hidden');
        }
    </script>
</body>
</html>
